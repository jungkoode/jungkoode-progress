<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jungkoode's fanfiction progress</title>

    <script>
    // update this + the numbers below, everything else updates itself
    const LAST_UPDATED = "July 14th, 2026";

    const FICS = [
      { title: "fuck me up ♪", meta: "fuck buddies • slow burn • roommates to lovers • psych. depth", writing: 100, editing: 0, aesthetics: 0 },
      { title: "geumji ✎", meta: "gang au • violence • enemies to lovers • slow burn • fuck buddies", backlog: true },
      { title: "unmanageable ✎", meta: "entertainment industry • pure hatred to love • manager x actor", backlog: true },
      { title: "margins ✎", meta: "publishing industry • cat vs. dog • workplace romance • romcom", backlog: true },
      { title: "the 25th hour ♪", meta: "dystopian • time-bending • psychological • starcrossed+fated lovers", writing: 100, editing: 100, aesthetics: 0 },
      { title: "we grew up somewhere along the way ♪", meta: "osaka 2003 • childhood friends to lovers • grumpy x sunshine", writing: 100, editing: 100, aesthetics: 20 },
      { title: "code : epitaph ♪", meta: "dystopian • blood bonds • 60 days survival • e2l—pure hatred", writing: 75, editing: 0, aesthetics: 0 },
      { title: "5 seconds to freedom ♪", meta: "street racing • tokyo • heiress x racer • rivals to lovers • latino!jimin", writing: 100, editing: 0, aesthetics: 0 },
      { title: "out of line ♪", meta: "football • real madrid • arrogant!tae • slowburn", writing: 50, editing: 0, aesthetics: 0 },
      { title: "altars in shallow waters ♪", meta: "stalker!tae • ballerina!reader • paris • psychological • dark romance", writing: 100, editing: 0, aesthetics: 0 },
      { title: "in the presence of you ✎", meta: "royalty • 1700s/1800s • arranged marriage • slow burn", backlog: true },
    ];
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --peri-bg: #D7E0FF;
            --peri-soft: #CACFE6;
            --peri-medium: #B3BAD7;
            --peri-greylav: #A3A9BF;
            --peri-deep: #8D93A8;
            --peri-slate: #777D92;
            --peri-ice: #EAEEF8;
            --dark-text: #383D50;
            --progress-bg: #EAEEF8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--peri-ice) 0%, var(--peri-bg) 100%);
            color: var(--dark-text);
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
            position: relative;
        }

        .header::before {
            content: '✦ ✦ ✦';
            display: block;
            font-size: 1.5rem;
            color: var(--peri-medium);
            margin-bottom: 1rem;
            letter-spacing: 2rem;
        }

        h1 {
            font-family: 'Crimson Text', serif;
            font-size: 2.5rem;
            font-weight: 600;
            color: var(--peri-slate);
            margin-bottom: 0.5rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .subtitle {
            font-style: italic;
            color: var(--peri-slate);
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }

        .encouragement {
            background: var(--peri-soft);
            padding: 1rem 1.5rem;
            border-radius: 15px;
            margin: 2rem 0;
            text-align: center;
            font-style: italic;
            border-left: 4px solid var(--peri-medium);
        }

        .kofi-section {
            background: linear-gradient(135deg, var(--peri-medium), var(--peri-slate));
            border-radius: 15px;
            padding: 2rem;
            margin: 2rem 0;
            text-align: center;
            color: white;
            box-shadow: 0 6px 20px rgba(119, 125, 146, 0.35);
            position: relative;
            overflow: hidden;
        }

        .kofi-section::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: shimmer 3s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% { transform: translateX(-100%) translateY(-100%) rotate(0deg); }
            50% { transform: translateX(0%) translateY(0%) rotate(180deg); }
        }

        .kofi-content {
            position: relative;
            z-index: 2;
        }

        .kofi-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.3));
        }

        .kofi-section h3 {
            font-family: 'Crimson Text', serif;
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        .kofi-section p {
            font-size: 1rem;
            margin-bottom: 1.5rem;
            opacity: 0.95;
            font-style: italic;
        }

        .kofi-button {
            background: white;
            color: var(--peri-slate);
            padding: 0.8rem 2rem;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            display: inline-block;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border: 2px solid transparent;
        }

        .kofi-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            background: var(--peri-ice);
            border-color: white;
        }

        .last-updated {
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid var(--peri-soft);
            border-radius: 12px;
            padding: 1rem 1.5rem;
            margin: 1rem 0 2rem 0;
            text-align: center;
            font-style: italic;
            color: var(--peri-slate);
            font-size: 0.95rem;
        }

        .last-updated strong {
            color: var(--dark-text);
            font-weight: 600;
        }

        .fic-grid {
            display: grid;
            gap: 1.5rem;
        }

        .fic-card {
            background: rgba(255, 255, 255, 0.8);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 15px rgba(141, 147, 168, 0.18);
            border: 1px solid var(--peri-soft);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .fic-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(141, 147, 168, 0.3);
        }

        .fic-title {
            font-family: 'Crimson Text', serif;
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--dark-text);
            margin-bottom: 0.5rem;
        }

        .fic-meta {
            font-size: 0.9rem;
            color: var(--peri-slate);
            margin-bottom: 1rem;
            font-style: italic;
        }

        .next-chapter {
            background: var(--peri-medium);
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            display: inline-block;
            margin-bottom: 1rem;
        }

        .progress-section {
            margin-top: 1rem;
        }

        .progress-item {
            margin-bottom: 0.8rem;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.3rem;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--progress-bg);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.8s ease-in-out;
        }

        .writing { background: linear-gradient(90deg, var(--peri-medium), var(--peri-soft)); }
        .editing { background: linear-gradient(90deg, var(--peri-deep), var(--peri-medium)); }
        .aesthetics { background: linear-gradient(90deg, var(--peri-slate), var(--peri-deep)); }

        .backlog-large {
            background: var(--peri-soft);
            color: var(--dark-text);
            padding: 1.5rem 2rem;
            border-radius: 25px;
            font-size: 1.1rem;
            font-style: italic;
            text-align: center;
            margin-top: 1rem;
            border: 2px solid var(--peri-medium);
            font-weight: 500;
        }

        @media (max-width: 600px) {
            .container {
                padding: 1rem 0.5rem;
            }

            h1 {
                font-size: 2rem;
            }

            .fic-card {
                padding: 1rem;
            }

            .kofi-section {
                padding: 1.5rem;
                margin: 1.5rem 0;
            }

            .kofi-section h3 {
                font-size: 1.4rem;
            }

            .kofi-button {
                padding: 0.7rem 1.5rem;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>jungkoode's fanfiction</h1>
            <p class="subtitle">current chapter progress</p>
        </header>

        <div class="encouragement">
            likes, reblogs and beautiful lovely comments make these percentages go up! ♡´･ᴗ･`♡
        </div>

        <div class="kofi-section">
            <div class="kofi-content">
                <div class="kofi-icon">☕</div>
                <h3>early access &amp; sneak peeks</h3>
                <p>get chapters before anyone else + juicy behind-the-scenes content on my ko-fi!</p>
                <a href="https://ko-fi.com/jungkoode" target="_blank" class="kofi-button">
                    support me on ko-fi ♡
                </a>
            </div>
        </div>

        <div class="last-updated">
            <strong>last updated:</strong> <span class="update-date"></span>
        </div>

        <div class="fic-grid" id="ficGrid"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            document.querySelector('.update-date').textContent = LAST_UPDATED;

            function progressScore(fic) {
                if (fic.backlog) return -1;
                const w = fic.writing || 0;
                const e = fic.editing || 0;
                const a = fic.aesthetics || 0;
                let complete = 0;
                if (w === 100) complete++;
                if (e === 100) complete++;
                if (a === 100) complete++;
                return complete * 1000 + w + e + a;
            }

            function progressItem(label, cls, value) {
                return '<div class="progress-item">' +
                    '<div class="progress-label"><span>' + label + '</span><span>' + value + '%</span></div>' +
                    '<div class="progress-bar"><div class="progress-fill ' + cls + '" style="width: 0%" data-target="' + value + '"></div></div>' +
                '</div>';
            }

            function buildCard(fic) {
                const card = document.createElement('div');
                card.className = 'fic-card';

                if (fic.backlog) {
                    card.innerHTML = '<h2 class="fic-title">' + fic.title + '</h2>' +
                        '<p class="fic-meta">' + fic.meta + '</p>' +
                        '<div class="backlog-large">backlogging chapters</div>';
                    return card;
                }

                card.innerHTML = '<h2 class="fic-title">' + fic.title + '</h2>' +
                    '<p class="fic-meta">' + fic.meta + '</p>' +
                    '<span class="next-chapter">next chapter</span>' +
                    '<div class="progress-section">' +
                        progressItem('writing', 'writing', fic.writing || 0) +
                        progressItem('editing', 'editing', fic.editing || 0) +
                        progressItem('working on aesthetics', 'aesthetics', fic.aesthetics || 0) +
                    '</div>';
                return card;
            }

            const grid = document.getElementById('ficGrid');
            const sorted = FICS.slice().sort(function(a, b) {
                return progressScore(b) - progressScore(a);
            });
            sorted.forEach(function(fic) {
                grid.appendChild(buildCard(fic));
            });

            // let the bars animate in
            requestAnimationFrame(function() {
                document.querySelectorAll('.progress-fill').forEach(function(fill) {
                    fill.style.width = fill.getAttribute('data-target') + '%';
                });
            });
        });
    </script>
</body>
</html>
